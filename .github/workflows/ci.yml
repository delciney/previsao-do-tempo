name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: previsaodotempo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: previsaodotempo/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          chave_hgbrasil_weather: ${{ secrets.CHAVE_HGBRASIL_WEATHER }}
